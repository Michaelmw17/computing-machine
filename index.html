    <!-- Static above-the-fold paint. This MUST live outside #root: React's
         createRoot().render() clears #root on mount, which would remove the
         inline hero image and force LCP to re-evaluate against whatever React
         renders later (3–4 s away). By keeping the shell as a sibling of
         #root, the hero stays in the DOM the entire time, the LCP element is
         never removed, and the timestamp sticks at first paint. A small
         inline script hides the shell once React mounts so it doesn't overlap
         the rendered app — hiding after paint doesn't reset LCP per the spec.
         Inline styles only so there's no extra render-blocking CSS request. -->
    <div id="static-shell">

    <div id="root"></div>

    <style>
      /* Stack the shell on top of the React tree (z-index) and fade it out
         after React mounts. Critically, we use `opacity` (not display/
         visibility) so the shell's elements stay LCP-candidates per Chrome's
         LCP implementation — `display: none` and `visibility: hidden` revoke
         candidacy and force LCP to fall back to the React-rendered paragraph
         (which only paints once JS executes, ~6s on throttled mobile).
         pointer-events:none lets clicks through to the (eventually visible)
         React tree underneath. */
      #static-shell {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1;
        pointer-events: none;
        transition: opacity 0.2s ease-out;
      }
      #static-shell.is-faded {
        opacity: 0;
      }
      #root {
        position: relative;
        z-index: 0;
      }
    </style>
    <script>
      // Fade the shell out once React has rendered. Using opacity (not
      // display:none) keeps the shell's elements eligible as LCP candidates
      // per Chrome's LCP implementation — so the preloaded hero image stays
      // the LCP element instead of being overridden by whatever React paints
      // 4+ seconds later.
      (function () {
        var root = document.getElementById('root');
        if (!root) return;
        var fade = function () {
          var shell = document.getElementById('static-shell');
          if (shell) shell.classList.add('is-faded');
        };
        var obs = new MutationObserver(function (_, observer) {
          if (root.firstElementChild) {
            // Wait one extra frame so LCP has a chance to fire on the shell
            // hero before we start fading.
            requestAnimationFrame(function () {
              requestAnimationFrame(fade);
            });
            observer.disconnect();
          }
        });
        obs.observe(root, { childList: true });
      })();
    </script>
